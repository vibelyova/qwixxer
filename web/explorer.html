<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e74c3c" />
    <title>Qwixx State Explorer</title>
    <link rel="stylesheet" href="/src/ts/style.css" />
    <link rel="manifest" href="/qwixxer/manifest.json" />
    <link rel="icon" href="/qwixxer/icon-192.png" />
</head>
<body>
    <div id="app">
        <header>
            <h1>Qwixx State Explorer</h1>
            <a href="index.html">Back to Game</a>
        </header>

        <section id="explorer-board" class="board-section">
            <div class="board-label">Scoresheet (click to toggle marks)</div>
            <div id="scoresheet"></div>
        </section>

        <section id="slider-area">
            <div class="slider-group">
                <label for="opponents-slider">Opponents: <span id="opponents-value">1</span></label>
                <input type="range" id="opponents-slider" min="1" max="4" value="1" step="1" />
            </div>
            <div class="slider-group">
                <label for="opp-strikes-slider">Max opponent strikes: <span id="opp-strikes-value">0</span></label>
                <input type="range" id="opp-strikes-slider" min="0" max="3" value="0" step="1" />
            </div>
            <div class="slider-group">
                <label for="score-gap-slider">Score gap: <span id="score-gap-value">0</span></label>
                <input type="range" id="score-gap-slider" min="-100" max="100" value="0" step="1" />
            </div>
        </section>

        <section id="eval-area" class="board-section">
            <div class="board-label">Evaluation</div>
            <div id="eval-display"></div>
        </section>
    </div>

    <script type="module" src="/src/ts/explorer.ts"></script>
</body>
</html>
